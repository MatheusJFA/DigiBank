# ======================
# Configurações Gerais
# ======================
spring:
  application:
    name: Digibank

server:
  port: 8080

cors:
  allowed-origins: "http://localhost:5173"

  # ======================
  # Banco de Dados
  # ======================

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/digibank}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
      properties:
        hibernate.format_sql: true

  # ======================
  # Redis
  # ======================
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}

  # ======================
  # Kafka
  # ======================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: digibank-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.apache.kafka.common.serialization.StringSerializer
  # ======================
  # Segurança (JWT)
  # ======================
security:
    jwt:
      secret-key: ${SECURITY_JWT_SECRET_KEY:secret}
      expiration-ms: 3600000

  # ======================
  # Observabilidade
  # ======================
management:
    endpoints:
        web:
          exposure:
            include: "*"
    endpoint:
        health:
          show-details: always
    trace:
        http:
        enabled: true

# ======================
# Configurações de Log
# ======================
logging:
  pattern:
    console: '%clr(%d{dd-MM-yyyy HH:mm:ss}){faint} %clr(%5p) %clr([%t]){faint} %clr(%-40.40logger){cyan} %clr(:){yellow} %m%n'
  file:
    name: app.log
  level:
    root: warn
    io:
      github:
        cursodsousa: trace
    org:
      springframework:
        web: debug
        security: trace